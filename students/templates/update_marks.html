{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4 mx-auto" style="max-width: 500px; border-top: 8px solid #0d6efd;">
        <h4 class="mb-3 text-dark text-center" style="font-weight: 800; text-decoration: underline;"><em>Update Records</em></h4>
        <hr style="border: 1px solid #000; opacity: 1;">

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label" style="font-weight: 700; color: #000;">Internal Marks (Max 30)</label>
                <input type="number" name="internal" class="form-control border-dark" style="border-width: 2px;" value="{{ marks.internal_marks|default:0 }}">
            </div>

            <div class="mb-3">
                <label class="form-label" style="font-weight: 700; color: #000;">External Marks (Max 70)</label>
                <input type="number" name="external" class="form-control border-dark" style="border-width: 2px;" value="{{ marks.external_marks|default:0 }}">
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" name="is_submitted" class="form-check-input border-dark" style="transform: scale(1.2); cursor: pointer;" id="assignCheck" {{
                    assignment.is_submitted|yesno:"checked," }}>
                <label class="form-check-label ms-2" style="font-weight: 700; color: #0d6efd;" for="assignCheck"><em>Assignment Submitted</em></label>
            </div>

            <button type="submit" class="btn btn-primary w-100 p-3" style="font-weight: 800; font-size: 1.1rem; border: 2px solid #000;">Save Student Data</button>
            <div class="text-center mt-3">
                <a href="{% url 'dashboard' %}" class="text-muted small">Back to Dashboard</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
